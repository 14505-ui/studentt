<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | ประวัติส่วนตัว</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:linear-gradient(135deg,#ffd6eb,#ffb6d9,#ff69b4);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

/* เมฆ */

.cloud{
    position:fixed;
    background:white;
    width:180px;
    height:50px;
    border-radius:50px;
    opacity:.7;
    animation:cloudMove linear infinite;
    z-index:1;
}

.cloud:before,
.cloud:after{
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud:before{
    width:60px;
    height:60px;
    top:-30px;
    left:30px;
}

.cloud:after{
    width:50px;
    height:50px;
    top:-20px;
    right:30px;
}

.cloud1{
    top:100px;
    animation-duration:35s;
}

.cloud2{
    top:220px;
    animation-duration:50s;
}

@keyframes cloudMove{

    from{
        left:-250px;
    }

    to{
        left:100%;
    }

}


/* หัวใจลอย */

.heart{
    position:fixed;
    color:#ff1493;
    font-size:30px;
    animation:heartMove linear infinite;
    z-index:2;
}

@keyframes heartMove{

    from{
        transform:translateY(100vh);
        opacity:0;
    }

    to{
        transform:translateY(-100px);
        opacity:1;
    }

}


/* โบว์ */

.ribbon{
    position:fixed;
    right:50px;
    top:50px;
    width:90px;
    height:70px;
    z-index:3;
}


.ribbon span{
    position:absolute;
    width:40px;
    height:55px;
    background:#ff1493;
    border-radius:50%;
}


.ribbon span:first-child{
    left:0;
    transform:rotate(-30deg);
}


.ribbon span:nth-child(2){
    right:0;
    transform:rotate(30deg);
}


.ribbon b{
    position:absolute;
    background:#ffd700;
    width:30px;
    height:30px;
    border-radius:50%;
    left:30px;
    top:20px;
}


/* เมนู */

nav{

    background:rgba(255,105,180,.85);
    padding:18px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:20;
    backdrop-filter:blur(10px);

}


nav a{

    color:white;
    text-decoration:none;
    margin:10px;
    padding:10px 20px;
    border-radius:30px;
    font-weight:bold;
    transition:.3s;

}


nav a:hover{

    background:white;
    color:#ff1493;

}


/* กล่องข้อมูล */


.container{

    width:700px;
    max-width:90%;
    margin:50px auto;
    background:white;
    padding:35px;
    border-radius:30px;
    text-align:center;
    border:4px solid #ff9ecf;
    box-shadow:0 10px 30px rgba(255,20,147,.3);
    position:relative;
    z-index:10;
    animation:show 1s;

}


@keyframes show{

from{
    opacity:0;
    transform:translateY(40px);
}

to{
    opacity:1;
    transform:translateY(0);
}

}

/* รูปโปรไฟล์ */

img{

    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #ff69b4;
    box-shadow:0 0 25px #ffb6d9;
    transition:.4s;

}


img:hover{

    transform:scale(1.08);

}


/* หัวข้อ */

h1{

    color:#ff1493;
    margin:20px 0;
    text-shadow:2px 2px #ffd1e8;

}


h2{

    color:#ff69b4;
    margin-bottom:10px;

}



/* เส้น */

hr{

    border:none;
    height:2px;
    background:#ffb6d9;
    margin:25px 0;

}



/* ข้อมูล */

.info{

    text-align:left;
    margin-top:25px;
    font-size:18px;
    line-height:2;
    color:#c2185b;

}


.about{

    color:#ad1457;
    line-height:1.8;
    margin-top:20px;

}


/* ปุ่ม */

.btn{

    display:inline-block;
    margin:20px 5px 0;
    padding:12px 30px;
    background:linear-gradient(90deg,#ff69b4,#ff1493);
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 5px 15px rgba(255,20,147,.3);

}


.btn:hover{

    background:#ff1493;
    transform:scale(1.1);

}



/* ตกแต่งพื้นหลัง */

.flower{

    position:fixed;
    font-size:35px;
    animation:flowerMove 10s linear infinite;
    z-index:2;

}


@keyframes flowerMove{

    from{

        transform:translateY(100vh) rotate(0deg);

    }

    to{

        transform:translateY(-100px) rotate(360deg);

    }

}



/* มือถือ */

@media(max-width:600px){


nav a{

    display:inline-block;
    margin:5px;
    font-size:14px;

}


.container{

    padding:20px;

}


img{

    width:150px;
    height:150px;

}


.ribbon{

    right:20px;
    transform:scale(.7);

}


.info{

    font-size:16px;

}


}

</style>
