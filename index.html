<title>Portfolio นาย กิตติคุณ</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Sarabun",sans-serif;
}

body{

    background:linear-gradient(135deg,#ffd6eb,#ffb6d9,#ff69b4);
    color:#d63384;
    min-height:100vh;
    overflow-x:hidden;

}


/* เมฆ */

.cloud{

    position:fixed;
    width:180px;
    height:50px;
    background:white;
    border-radius:50px;
    opacity:.7;
    animation:moveCloud 35s linear infinite;
    z-index:1;

}

.cloud:before,
.cloud:after{

    content:"";
    position:absolute;
    background:white;
    border-radius:50%;

}

.cloud:before{

    width:60px;
    height:60px;
    top:-25px;
    left:30px;

}

.cloud:after{

    width:50px;
    height:50px;
    top:-20px;
    right:30px;

}


@keyframes moveCloud{

    from{
        left:-250px;
    }

    to{
        left:100%;
    }

}


/* หัวใจ */

.heart{

    position:fixed;
    font-size:30px;
    animation:heartMove 10s linear infinite;
    z-index:2;

}


@keyframes heartMove{

    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-100px);
    }

}



/* เมนู */

nav{

    background:rgba(255,105,180,.85);
    padding:15px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:20;
    backdrop-filter:blur(10px);

}


nav a{

    color:white;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;

}


nav a:hover{

    color:#ffe600;

}



/* กล่องเนื้อหา */

.container{

    width:80%;
    max-width:900px;
    margin:40px auto;
    background:rgba(255,255,255,.85);
    padding:30px;
    border-radius:30px;
    text-align:center;
    border:4px solid #ff9ecf;
    box-shadow:0 10px 30px rgba(255,20,147,.3);
    position:relative;
    z-index:10;

}



/* รูป */

img{

    width:220px;
    height:220px;
    border-radius:50%;
    border:6px solid #ff69b4;
    object-fit:cover;
    margin-bottom:20px;
    box-shadow:0 0 25px #ffb6d9;
    transition:.3s;

}


img:hover{

    transform:scale(1.05);

}



/* ข้อความ */

h1{

    font-size:40px;
    margin-bottom:10px;
    color:#ff1493;

}


h2{

    color:#ff69b4;
    margin-bottom:20px;

}


p{

    font-size:20px;
    margin:10px 0;
    color:#ad1457;

}



/* ปุ่ม */

.btn{

    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#ff69b4;
    color:white;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
    transition:.3s;

}


.btn:hover{

    background:#ff1493;
    transform:scale(1.05);

}



/* footer */

footer{

    text-align:center;
    padding:20px;
    margin-top:40px;
    background:rgba(255,105,180,.8);
    color:white;

}


/* มือถือ */

@media(max-width:600px){

h1{
    font-size:28px;
}

nav a{

    display:inline-block;
    margin:5px;
    font-size:14px;

}

.container{

    width:90%;

}

}

</style>

</head>
