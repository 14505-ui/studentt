<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าแรก | พอร์ตโฟลิโอ สาขาพลศึกษา</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#12181a;
    --bg-1:#1b2622;
    --track-red:#a83a1e;
    --accent:#ff6a3d;
    --gold:#e8b84b;
    --ink:#f4f1ea;
    --ink-dim:#b9c2bd;
    --line:rgba(244,241,234,0.08);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Sarabun',sans-serif;
    color:var(--ink);
    background:var(--bg-0);
    overflow:hidden;
  }
  /* ---------- night football stadium background ---------- */
  .field-bg{
    position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 90% 55% at 50% 6%, rgba(255,205,160,0.10), transparent 60%),
      linear-gradient(180deg, #060a0b 0%, #0a1416 44%, #0d1a17 54%, #16311f 56%, #0e2216 100%);
  }
  .field-bg::before{
    /* stars, upper sky only */
    content:"";position:absolute;inset:0 0 55% 0;
    background-image:
      radial-gradient(1.4px 1.4px at 12% 20%, rgba(244,241,234,.6), transparent),
      radial-gradient(1.4px 1.4px at 27% 9%, rgba(244,241,234,.4), transparent),
      radial-gradient(1px 1px at 44% 24%, rgba(244,241,234,.5), transparent),
      radial-gradient(1.4px 1.4px at 61% 11%, rgba(244,241,234,.35), transparent),
      radial-gradient(1px 1px at 76% 27%, rgba(244,241,234,.5), transparent),
      radial-gradient(1.4px 1.4px at 89% 15%, rgba(244,241,234,.4), transparent),
      radial-gradient(1px 1px at 8% 36%, rgba(244,241,234,.3), transparent),
      radial-gradient(1.4px 1.4px at 95% 33%, rgba(244,241,234,.3), transparent);
    animation:twinkle 5s ease-in-out infinite;
  }
  @keyframes twinkle{0%,100%{opacity:.65;}50%{opacity:1;}}
  .field-bg::after{
    content:"";position:absolute;inset:0;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .pitch-lines{position:fixed;left:0;right:0;bottom:0;height:46%;z-index:0;opacity:.55;}

  /* stadium stands silhouette along the horizon */
  .stands{
    position:fixed;left:-2%;right:-2%;bottom:53.5%;height:8.5%;z-index:0;
    background:
      repeating-linear-gradient(180deg, rgba(0,0,0,0.3) 0 2px, transparent 2px 6px),
      linear-gradient(180deg, #050708 0%, #0a1214 100%);
    clip-path:polygon(0% 100%,0% 42%,6% 30%,14% 46%,22% 24%,30% 42%,38% 20%,46% 40%,54% 20%,62% 42%,70% 24%,78% 46%,86% 30%,94% 42%,100% 30%,100% 100%);
  }
  .stands::after{
    content:"";position:absolute;inset:0;
    background-image:
      radial-gradient(1px 1px at 9% 58%, rgba(255,224,160,.8), transparent),
      radial-gradient(1px 1px at 17% 66%, rgba(255,224,160,.55), transparent),
      radial-gradient(1px 1px at 28% 54%, rgba(255,224,160,.7), transparent),
      radial-gradient(1px 1px at 39% 64%, rgba(255,224,160,.5), transparent),
      radial-gradient(1px 1px at 51% 56%, rgba(255,224,160,.75), transparent),
      radial-gradient(1px 1px at 63% 66%, rgba(255,224,160,.5), transparent),
      radial-gradient(1px 1px at 74% 54%, rgba(255,224,160,.8), transparent),
      radial-gradient(1px 1px at 85% 64%, rgba(255,224,160,.55), transparent),
      radial-gradient(1px 1px at 94% 56%, rgba(255,224,160,.65), transparent);
    animation:twinkle 4.5s ease-in-out infinite reverse;
  }

  /* floodlight towers rising behind the stands */
  .towers{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .tower{position:absolute;bottom:53.5%;width:5px;background:linear-gradient(180deg,#20302c,#070b09);}
  .tower::after{
    content:"";position:absolute;top:-12px;left:50%;transform:translateX(-50%);
    width:30px;height:10px;border-radius:3px;background:#f0e2c4;
    animation:towerPulse 3.6s ease-in-out infinite;
  }
  .tower-l{left:3.5%;height:26vh;}
  .tower-r{right:3.5%;height:26vh;}
  .tower-r::after{animation-delay:-1.8s;}
  @keyframes towerPulse{
    0%,100%{box-shadow:0 0 22px 8px rgba(255,232,190,0.5), 0 0 58px 24px rgba(255,200,140,0.20);}
    50%{box-shadow:0 0 32px 13px rgba(255,232,190,0.78), 0 0 84px 36px rgba(255,200,140,0.34);}
  }

  /* light beams sweeping slowly over the pitch, like real floodlights searching the field */
  .beam{
    position:fixed;z-index:0;pointer-events:none;mix-blend-mode:screen;
    background:linear-gradient(180deg, rgba(255,232,190,0.20), rgba(255,232,190,0) 78%);
    clip-path:polygon(46% 0%, 54% 0%, 100% 100%, 0% 100%);
    transform-origin:top center;
  }
  .beam-l{top:14vh;left:5.8%;width:24vw;height:48vh;animation:beamSwayL 10s ease-in-out infinite;}
  .beam-r{top:14vh;right:5.8%;width:24vw;height:48vh;animation:beamSwayR 11s ease-in-out infinite;animation-delay:-5s;}
  @keyframes beamSwayL{
    0%,100%{transform:rotate(6deg);opacity:.45;}
    50%{transform:rotate(16deg);opacity:.85;}
  }
  @keyframes beamSwayR{
    0%,100%{transform:rotate(-6deg);opacity:.45;}
    50%{transform:rotate(-16deg);opacity:.85;}
  }

  /* thin mist drifting just above the grass */
  .mist{
    position:fixed;left:-10%;right:-10%;bottom:44%;height:13%;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse 55% 100% at 28% 50%, rgba(230,235,225,0.10), transparent 70%),
      radial-gradient(ellipse 45% 100% at 74% 50%, rgba(230,235,225,0.08), transparent 70%);
    filter:blur(14px);
    animation:mistDrift 34s ease-in-out infinite;
  }
  @keyframes mistDrift{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(6%,-6px) scale(1.04);}
  }

  /* embers rising softly through the light beams */
  .sparks{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .spark{
    position:absolute;border-radius:50%;
    background:radial-gradient(circle, rgba(255,224,170,0.95), rgba(255,224,170,0) 72%);
    animation-name:rise;animation-timing-function:ease-in-out;animation-iteration-count:infinite;
  }
  @keyframes rise{
    0%{transform:translateY(0);opacity:0;}
    12%{opacity:.85;}
    88%{opacity:.3;}
    100%{transform:translateY(-58vh);opacity:0;}
  }

  /* soft ambient sky glow in the corners */
  .floodlights{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .flood{position:absolute;border-radius:50%;filter:blur(60px);animation-timing-function:ease-in-out;animation-iteration-count:infinite;}
  .flood-1{
    width:28vw;height:28vw;top:-10%;left:-8%;
    background:radial-gradient(circle, rgba(255,222,185,0.26), rgba(255,222,185,0) 70%);
    animation:drift1 24s infinite;
  }
  .flood-2{
    width:28vw;height:28vw;top:-10%;right:-8%;
    background:radial-gradient(circle, rgba(255,222,185,0.22), rgba(255,222,185,0) 70%);
    animation:drift2 28s infinite;
  }
  @keyframes drift1{
    0%,100%{transform:translate(0,0) scale(1);opacity:.8;}
    50%{transform:translate(2vw,1.5vh) scale(1.06);opacity:1;}
  }
  @keyframes drift2{
    0%,100%{transform:translate(0,0) scale(1);opacity:.7;}
    50%{transform:translate(-2vw,1.5vh) scale(.96);opacity:.95;}
  }

  /* ---------- floating sports gear ---------- */
  .gear-layer{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .gear{position:absolute;}
  .gear svg{display:block;}
  .g-ball{top:11%;left:6%;width:60px;color:rgba(244,241,234,0.18);animation:floatSpin 16s ease-in-out infinite;}
  .g-whistle{top:17%;right:8%;width:44px;color:rgba(232,184,75,0.20);animation:floatSpin 20s ease-in-out infinite reverse;animation-delay:-4s;}
  .g-watch{bottom:15%;left:8%;width:50px;color:rgba(244,241,234,0.16);animation:floatSpin 22s ease-in-out infinite;animation-delay:-8s;}
  .g-cone{bottom:9%;right:7%;width:48px;color:rgba(255,106,61,0.20);animation:floatSpin 18s ease-in-out infinite reverse;animation-delay:-2s;}
  .g-medal{top:46%;left:3%;width:40px;color:rgba(232,184,75,0.16);animation:floatSpin 24s ease-in-out infinite;animation-delay:-12s;}
  @keyframes floatSpin{
    0%{transform:translateY(0) rotate(0deg);}
    50%{transform:translateY(-20px) rotate(180deg);}
    100%{transform:translateY(0) rotate(360deg);}
  }
  @media (prefers-reduced-motion: reduce){
    .flood{animation:none;}
    .gear{animation:none;}
    .field-bg::before,.stands::after{animation:none;}
    .beam{animation:none;opacity:.6;}
    .mist{animation:none;}
    .tower::after{animation:none;}
    .spark{animation:none;opacity:0;}
  }
  @media (max-width:640px){
    .gear-layer{display:none;}
    .sparks{display:none;}
    .beam-l,.beam-r{width:34vw;}
    .tower-l,.tower-r{height:20vh;}
  }

  /* ---------- app shell ---------- */
  .app{
    position:relative;z-index:1;
    height:100dvh;width:100%;
    display:flex;flex-direction:column;
  }
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:22px 6vw 0;
  }
  .brand{
    font-family:'Kanit',sans-serif;font-weight:700;letter-spacing:.06em;
    font-size:14px;color:var(--ink-dim);text-transform:uppercase;
  }
  .brand b{color:var(--accent);}
  .lane-tag{
    font-family:'Kanit',sans-serif;font-weight:600;font-size:12px;
    color:var(--ink-dim);letter-spacing:.15em;text-transform:uppercase;
    border:1px solid var(--line);padding:6px 14px;border-radius:2px;
  }
  .lane-tag b{color:var(--gold);}

  .stage{
    flex:1;position:relative;min-height:0;
  }
  .page{
    position:absolute;inset:0;
    display:flex;align-items:center;
    padding:2vh 6vw 12vh;
    opacity:0;visibility:hidden;
    transform:translateX(40px);
    transition:opacity .5s ease, transform .5s ease, visibility 0s linear .5s;
    overflow-y:auto;
  }
  .page.active{
    opacity:1;visibility:visible;transform:translateX(0);
    transition:opacity .5s ease, transform .5s ease;
  }

  h1,h2{font-family:'Kanit',sans-serif;}
  .eyebrow{
    font-family:'Kanit',sans-serif;color:var(--accent);font-weight:600;
    letter-spacing:.2em;text-transform:uppercase;font-size:13px;margin-bottom:14px;
  }

  /* ---------- photo placeholder ---------- */
  .photo-slot{
    position:relative;border-radius:6px;overflow:hidden;
    border:2px dashed rgba(244,241,234,0.35);
    background:linear-gradient(160deg,#232f2a,#161e1c);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .photo-slot img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-slot .hint{
    text-align:center;color:var(--ink-dim);font-size:12px;padding:10px;
    font-family:'Kanit',sans-serif;
  }
  .photo-slot .hint svg{display:block;margin:0 auto 8px;opacity:.6;}

  /* ---------- page 1 : index (centered hero) ---------- */
  .page.hero-page{justify-content:center;}
  .hero-center{
    width:100%;max-width:620px;margin:0 auto;text-align:center;
    display:flex;flex-direction:column;align-items:center;
  }
  .hero-center .photo-slot{
    width:min(46vw,300px);aspect-ratio:1/1;border-radius:50%;
    border:3px solid rgba(232,184,75,0.55);
    box-shadow:0 0 0 10px rgba(255,106,61,0.06), 0 0 60px rgba(255,167,110,0.20);
    margin-bottom:26px;
  }
  #page-1 h1{font-size:clamp(32px,5.4vw,58px);line-height:1.08;font-weight:800;}
  #page-1 h1 .accent{color:var(--accent);}
  #page-1 .role{
    margin-top:16px;font-size:clamp(15px,1.6vw,18px);color:var(--ink-dim);
    max-width:46ch;font-weight:300;line-height:1.7;
  }
  #page-1 .school-tag{
    margin-top:20px;display:inline-flex;gap:10px;align-items:center;
    font-family:'Kanit',sans-serif;font-size:13px;color:var(--gold);
    border-left:3px solid var(--gold);padding-left:12px;
  }

  /* ---------- buttons ---------- */
  .btn{
    font-family:'Kanit',sans-serif;font-weight:600;letter-spacing:.03em;
    border:none;cursor:pointer;border-radius:2px;text-decoration:none;
    padding:14px 28px;font-size:15px;
    display:inline-flex;align-items:center;gap:10px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:3px;}
  .btn:hover{transform:translateY(-2px);}
  .btn-primary{
    background:var(--accent);color:#191008;
    box-shadow:0 8px 24px rgba(255,106,61,0.25);
  }
  .btn-ghost{
    background:transparent;color:var(--ink);border:1px solid rgba(244,241,234,0.3);
  }
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  #page-1 .cta{margin-top:34px;}

  /* ---------- page 2: profile ---------- */
  #page-2 .layout{display:grid;grid-template-columns:.7fr 1.3fr;gap:6vw;align-items:start;width:100%;}
  #page-2 .photo-slot{width:100%;aspect-ratio:3/4;}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 28px;margin-top:26px;}
  .info-item{border-bottom:1px solid var(--line);padding-bottom:12px;}
  .info-item .label{font-family:'Kanit',sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
  .info-item .value{font-size:15px;color:var(--ink);}
  .motto{
    margin-top:26px;font-family:'Kanit',sans-serif;font-size:18px;font-weight:600;
    color:var(--accent);border-left:3px solid var(--accent);padding-left:14px;
  }

  /* ---------- page 3: education timeline ---------- */
  .timeline{margin-top:30px;position:relative;padding-left:34px;width:100%;max-width:760px;}
  .timeline::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--line);}
  .t-item{position:relative;padding-bottom:32px;}
  .t-item:last-child{padding-bottom:0;}
  .t-item::before{
    content:"";position:absolute;left:-34px;top:4px;width:18px;height:18px;border-radius:50%;
    background:var(--bg-0);border:3px solid var(--accent);
  }
  .t-item .period{font-family:'Kanit',sans-serif;font-size:12px;color:var(--gold);letter-spacing:.1em;margin-bottom:4px;}
  .t-item .title{font-family:'Kanit',sans-serif;font-weight:600;font-size:18px;margin-bottom:4px;}
  .t-item .desc{color:var(--ink-dim);font-size:14px;font-weight:300;line-height:1.6;}
  .goal-box{
    margin-top:26px;background:rgba(255,106,61,0.08);border:1px solid rgba(255,106,61,0.3);
    padding:16px 20px;border-radius:4px;max-width:760px;
  }
  .goal-box .label{font-family:'Kanit',sans-serif;color:var(--accent);font-size:12px;letter-spacing:.1em;margin-bottom:6px;}

  /* ---------- page 4: awards ---------- */
  .award-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px;width:100%;max-width:800px;margin-top:26px;}
  .award-card{
    background:rgba(244,241,234,0.03);border:1px solid var(--line);border-radius:6px;
    overflow:hidden;
  }
  .award-card .photo-slot{width:100%;aspect-ratio:4/3;border-radius:0;border-width:2px;}
  .award-card .cap{padding:12px 14px;}
  .award-card .cap .num{font-family:'Kanit',sans-serif;color:var(--gold);font-size:11px;letter-spacing:.12em;}
  .award-card .cap .name{font-family:'Kanit',sans-serif;font-weight:600;font-size:14px;margin-top:3px;}

  /* ---------- page 5: contact ---------- */
  .contact-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px 40px;margin-top:28px;max-width:640px;width:100%;}
  .contact-item{display:flex;align-items:center;gap:12px;}
  .contact-item .ic{
    width:38px;height:38px;border-radius:50%;background:rgba(255,106,61,0.12);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--accent);
  }
  .contact-item .txt .label{font-size:11px;color:var(--ink-dim);font-family:'Kanit',sans-serif;letter-spacing:.08em;}
  .contact-item .txt .value{font-size:15px;}
  .close-line{margin-top:36px;color:var(--ink-dim);font-size:14px;font-weight:300;max-width:56ch;line-height:1.7;}

  /* ---------- bottom navigation ---------- */
  .nav-bar{
    position:absolute;left:0;right:0;bottom:0;z-index:2;
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 6vw 26px;
  }
  .lane-dots{display:flex;gap:10px;align-items:center;}
  .dot{
    width:9px;height:9px;border-radius:50%;background:rgba(244,241,234,0.25);
    transition:all .3s ease;
  }
  .dot.on{background:var(--accent);width:26px;border-radius:5px;}
  .nav-side{display:flex;gap:12px;}

  /* ---------- responsive ---------- */
  @media (max-width:840px){
    #page-2 .layout{grid-template-columns:1fr;}
    .hero-center .photo-slot{width:52vw;max-width:220px;}
    #page-2 .photo-slot{max-width:200px;}
    .info-grid{grid-template-columns:1fr;}
    .award-grid{grid-template-columns:1fr;}
    .contact-grid{grid-template-columns:1fr;}
    .page{padding:2vh 6vw 22vh;}
    .topbar{padding:16px 6vw 0;}
    .nav-bar{padding:16px 6vw 20px;flex-direction:column-reverse;gap:14px;align-items:flex-end;}
  }
</style>
</head>
<body>

<div class="field-bg"></div>

<svg class="pitch-lines" viewBox="0 0 1000 460" preserveAspectRatio="none" aria-hidden="true">
  <line x1="0" y1="70" x2="1000" y2="70" stroke="rgba(244,241,234,0.5)" stroke-width="2"/>
  <ellipse cx="500" cy="70" rx="150" ry="46" fill="none" stroke="rgba(244,241,234,0.5)" stroke-width="2"/>
  <circle cx="500" cy="70" r="4" fill="rgba(244,241,234,0.6)"/>
  <path d="M300 460 L300 300 Q300 250 500 250 Q700 250 700 300 L700 460" fill="none" stroke="rgba(244,241,234,0.45)" stroke-width="2"/>
  <path d="M380 460 L380 380 Q380 350 500 350 Q620 350 620 380 L620 460" fill="none" stroke="rgba(244,241,234,0.45)" stroke-width="2"/>
</svg>

<div class="stands"></div>

<div class="towers">
  <div class="tower tower-l"></div>
  <div class="tower tower-r"></div>
</div>

<div class="beam beam-l"></div>
<div class="beam beam-r"></div>

<div class="mist"></div>

<div class="sparks" aria-hidden="true">
  <span class="spark" style="left:16%;width:3px;height:3px;bottom:32%;animation-duration:8s;animation-delay:0s;"></span>
  <span class="spark" style="left:24%;width:2px;height:2px;bottom:28%;animation-duration:11s;animation-delay:-3s;"></span>
  <span class="spark" style="left:38%;width:2.5px;height:2.5px;bottom:34%;animation-duration:9.5s;animation-delay:-6s;"></span>
  <span class="spark" style="left:63%;width:2px;height:2px;bottom:29%;animation-duration:10s;animation-delay:-2s;"></span>
  <span class="spark" style="left:76%;width:3px;height:3px;bottom:33%;animation-duration:8.5s;animation-delay:-5s;"></span>
  <span class="spark" style="left:84%;width:2px;height:2px;bottom:27%;animation-duration:12s;animation-delay:-8s;"></span>
</div>

<div class="floodlights">
  <div class="flood flood-1"></div>
  <div class="flood flood-2"></div>
</div>

<div class="gear-layer" aria-hidden="true">
  <div class="gear g-ball" style="width:60px">
    <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.3"/>
      <path d="M12 7.5l3.6 2.6-1.4 4.2H9.8l-1.4-4.2L12 7.5z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/>
      <path d="M12 3v4.5M4.8 8.6l3.6 1.1M19.2 8.6l-3.6 1.1M7 19l2.8-4.7M17 19l-2.8-4.7" stroke="currentColor" stroke-width="1"/>
    </svg>
  </div>
  <div class="gear g-whistle" style="width:44px">
    <svg viewBox="0 0 24 24" fill="none" width="100%" height="100%">
      <path d="M3 12a4 4 0 014-4h5l4-2v3h1a4 4 0 010 8h-1v3l-4-2H7a4 4 0 01-4-4z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
      <circle cx="7.5" cy="12" r="1.4" stroke="currentColor" stroke-width="1.1"/>
    </svg>
  </div>
  <div class="gear g-watch" style="width:50px">
